name: Unpack source

on:
  push:
    branches:
      - main
    paths:
      - baoleme-source.zip
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import source files
        run: |
          unzip -o baoleme-source.zip
          rm baoleme-source.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import BaoLeMe source"
          git push
